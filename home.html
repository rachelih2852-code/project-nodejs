<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Paradise</title>

    <link rel="stylesheet" href="home.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;700&display=swap" rel="stylesheet">

    <script src="https://kit.fontawesome.com/8d4d4c3d9d.js" crossorigin="anonymous"></script>

</head>

<body>

<header>

    <div class="logo">
        HOTEL PARADISE!!!
    </div>

    <nav>

        <a href="#">דף הבית</a>
        <a href="#">החדרים</a>
        <a href="#">אודות</a>
        <a href="#">צור קשר</a>

    </nav>

</header>


<section class="hero">

    <div class="overlay">

        <h1>ברוכים הבאים למלון Paradise</h1>

        <p>החופשה המושלמת מתחילה כאן</p>

        <div class="search-box">

            <div class="input-box">

                <label>תאריך כניסה</label>
                <input type="date">

            </div>

            <div class="input-box">

                <label>תאריך יציאה</label>
                <input type="date">

            </div>

            <div class="input-box">

                <label>כמות חדרים</label>

                <select>

                    <option>1</option>
                    <option>2</option>
                    <option>3</option>
                    <option>4</option>

                </select>

            </div>

            <div class="input-box">

                <label>סוג חדר</label>

                <select>

                    <option>סטנדרט</option>
                    <option>דלוקס</option>
                    <option>סוויטה</option>
                    <option>משפחתי</option>

                </select>

            </div>

            <button>

                חפש חדרים

            </button>

        </div>

    </div>

</section>

</body>

</html>
